services:
  app:
    build: .
    container_name: any-auto-register
    ports:
      - "8001:8000"   # FastAPI / Web UI
      - "6080:6080"   # noVNC (headed 浏览器预览)
    environment:
      - DISPLAY=:99
      - RELOAD=true        # 启用热重载
    volumes:
      - ./data:/app/data   # 持久化 SQLite 数据库
      - ./api:/app/api
      - ./application:/app/application
      - ./core:/app/core
      - ./domain:/app/domain
      - ./infrastructure:/app/infrastructure
      - ./platforms:/app/platforms
      - ./scripts:/app/scripts
      - ./services:/app/services
      - ./main.py:/app/main.py
    restart: unless-stopped
